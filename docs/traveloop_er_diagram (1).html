
<div id="erd" style="padding:1rem 0"></div>
<style>
#erd svg { width:100%; height:auto; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efe8',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
  },
});
const diagram = `erDiagram
  users {
    CHAR36 id PK
    VARCHAR100 name
    VARCHAR255 email UK
    TEXT password_hash
    VARCHAR10 language_pref
    TINYINT is_admin
    TIMESTAMP created_at
    TIMESTAMP deleted_at
  }
  trips {
    CHAR36 id PK
    CHAR36 user_id FK
    VARCHAR200 title
    DATE start_date
    DATE end_date
    DECIMAL total_budget
    DECIMAL computed_spent
    DECIMAL computed_activity_cost
    CHAR36 share_token UK
    ENUM status
    TIMESTAMP created_at
  }
  cities {
    INT id PK
    VARCHAR150 name
    VARCHAR100 country
    DECIMAL avg_daily_cost_usd
    TINYINT popularity_score
    VARCHAR50 timezone
  }
  trip_stops {
    CHAR36 id PK
    CHAR36 trip_id FK
    INT city_id FK
    DATE arrival_date
    DATE departure_date
    TINYINT stop_order
    TEXT notes
  }
  activities {
    INT id PK
    INT city_id FK
    VARCHAR200 name
    ENUM category
    DECIMAL estimated_cost_usd
    DECIMAL duration_hours
    JSON tags
  }
  trip_activities {
    CHAR36 id PK
    CHAR36 trip_stop_id FK
    INT activity_id FK
    DATE scheduled_date
    TIME scheduled_time
    DECIMAL actual_cost_override
    TINYINT is_confirmed
  }
  budget_entries {
    CHAR36 id PK
    CHAR36 trip_id FK
    ENUM category
    VARCHAR200 label
    DECIMAL amount
    DATE entry_date
    TINYINT is_estimated
  }
  packing_items {
    CHAR36 id PK
    CHAR36 trip_id FK
    VARCHAR200 label
    ENUM category
    TINYINT is_packed
  }
  trip_notes {
    CHAR36 id PK
    CHAR36 trip_id FK
    CHAR36 stop_id FK
    TEXT content
    TIMESTAMP created_at
    TIMESTAMP updated_at
  }
  refresh_tokens {
    INT id PK
    CHAR36 user_id FK
    TEXT token
    TIMESTAMP expires_at
  }
  users ||--o{ trips : "creates"
  users ||--o{ refresh_tokens : "has"
  trips ||--o{ trip_stops : "contains"
  trips ||--o{ budget_entries : "tracks"
  trips ||--o{ packing_items : "packs"
  trips ||--o{ trip_notes : "notes"
  cities ||--o{ trip_stops : "visited in"
  cities ||--o{ activities : "offers"
  trip_stops ||--o{ trip_activities : "has"
  trip_stops ||--o{ trip_notes : "linked to"
  activities ||--o{ trip_activities : "added to"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke','none');
});
</script>
